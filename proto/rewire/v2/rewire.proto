syntax = "proto3";

package rewire.v2;

// Hosted by the rewire viewer (and, in the future, `rewire serve`).
// Clients: bridges (heartbeat + identity probe), CLI tools that need
// viewer-side state.
service ViewerService {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// Hosted by `rewire record` (the bridge process) on a loopback gRPC
// endpoint. Clients: `rewire log`, `rewire doctor`, `rewire types`.
service BridgeService {
  rpc NewRecording(NewRecordingRequest) returns (NewRecordingResponse);
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  rpc GetGraph(GetGraphRequest) returns (GetGraphResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string viewer = 1;
  string version = 2;
}

enum BridgeState {
  BRIDGE_STATE_UNSPECIFIED = 0;
  BRIDGE_STATE_IDLE = 1;
  BRIDGE_STATE_ACTIVE = 2;
}

message HeartbeatRequest {
  string bridge_id = 1;
  BridgeState state = 2;
}

message HeartbeatResponse {}

message NewRecordingRequest {
  optional string app_id = 1;
  optional string recording_id = 2;
}

message NewRecordingResponse {
  string recording_id = 1;
}

message ListTopicsRequest {}

message ListTopicsResponse {
  repeated TopicEntry topics = 1;
}

message TopicEntry {
  string name = 1;
  string type_name = 2;
  repeated string transports = 3;
}

message GetGraphRequest {}

message GetGraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphTopic topics = 2;
  repeated GraphService services = 3;
}

message GraphNode {
  string name = 1;
  optional string transport = 2;
}

message GraphTopic {
  string name = 1;
  string type_name = 2;
  repeated string publishers = 3;
  repeated string subscribers = 4;
  repeated string transports = 5;
  bool has_writers = 6;
}

message GraphService {
  string name = 1;
  string type_name = 2;
}
